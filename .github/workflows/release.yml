name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build:
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve bundle list
        id: bundles
        shell: bash
        run: |
          is_prerelease="${{ contains(github.ref_name, '-') }}"
          case "${{ runner.os }}" in
            Linux)
              list="deb,appimage"
              ;;
            Windows)
              if [ "$is_prerelease" = "true" ]; then
                list="nsis"
              else
                list="msi,nsis"
              fi
              ;;
            *)
              echo "Unsupported runner.os for bundle resolution: ${{ runner.os }}" >&2
              exit 1
              ;;
          esac
          echo "list=$list" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - run: pnpm install --frozen-lockfile

      - name: Fetch pdfium
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   ./scripts/fetch-pdfium.sh linux ;;
            Windows) ./scripts/fetch-pdfium.sh windows ;;
          esac

      - uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'eldraw ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --bundles ${{ steps.bundles.outputs.list }}

  publish:
    needs: [build, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Update release body and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --draft=false
